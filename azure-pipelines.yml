trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: DotNetCoreCLI@2
  displayName: Build Backend
  inputs:
    command: 'build'
    projects: 'server/*.sln'

- task: DotNetCoreCLI@2
  displayName: Test Backend
  inputs:
    command: 'test'
    projects: 'server/*.sln'

- task: Docker@2
  displayName: Build and Push Backend
  inputs:
    containerRegistry: 'todoacr'
    repository: 'todo-api'
    command: 'buildAndPush'
    Dockerfile: 'server/Dockerfile'
    tags: |
      latest
      $(Build.BuildId)

- task: Docker@2
  displayName: Build and Push Frontend
  inputs:
    containerRegistry: 'todoacr'
    repository: 'todo-web'
    command: 'buildAndPush'
    Dockerfile: 'client/Dockerfile'
    tags: |
      latest
      $(Build.BuildId)